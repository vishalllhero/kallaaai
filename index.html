<!DOCTYPE html>
<html>
<head>
  <title>KALLAA AI</title>
</head>
<body>

<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  background: #0f172a;
  color: white;
}

h1 {
  font-size: 40px;
  margin-top: 20px;
}

p {
  color: #94a3b8;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  width: 250px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #6366f1;
  color: white;
  cursor: pointer;
}
</style>

<input id="input" placeholder="Ask anything..." />
<button onclick="send()">Send</button>

<p id="response"></p>

<script>
async function send() {
  const message = document.getElementById("input").value;

  const res = await fetch("/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();
  document.getElementById("response").innerText = data.reply;
}
</script>

</body>
</html>
