<!DOCTYPE html>
<html>
<head>
  <title>KALLAA AI</title>
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
}
.container {
  max-width: 700px;
  margin: auto;
  padding: 20px;
}
.chat {
  height: 350px;
  overflow-y: auto;
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}
.message {
  margin: 8px 0;
}
.user { color: #38bdf8; text-align: right; }
.bot { color: #f1f5f9; text-align: left; }
input {
  width: 60%;
  padding: 10px;
}
button {
  padding: 10px;
  margin: 5px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🤖 KALLAA AI + NFT</h2>

  <button onclick="connectWallet()">🔗 Connect Wallet</button>
  <p id="wallet"></p>

  <div class="chat" id="chat"></div>

  <input id="input" placeholder="Type or speak..." />
  <button onclick="send()">Send</button>
  <button onclick="startListening()">🎤</button>

  <br><br>

  <button onclick="payNow()">💰 Buy with SOL</button>
</div>

<script>

let walletAddress = "";

// 🔗 WALLET CONNECT
async function connectWallet() {
  const resp = await window.solana.connect();
  walletAddress = resp.publicKey.toString();
  document.getElementById("wallet").innerText = walletAddress;
}

// 💬 CHAT UI
function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🤖 AI CHAT
async function send() {
  const input = document.getElementById("input");
  const msg = input.value;

  if (!msg) return;

  addMessage("You: " + msg, "user");
  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  addMessage("AI: " + data.reply, "bot");

  speak(data.reply);
}

// 🎤 VOICE INPUT
function startListening() {
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang = "hi-IN";

  rec.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById("input").value = text;
    send();
  };

  rec.start();
}

// 🔊 VOICE OUTPUT
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "hi-IN";
  speechSynthesis.speak(speech);
}

// 💰 SOL PAYMENT
async function payNow() {
  const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl("devnet"));

  const transaction = new solanaWeb3.Transaction().add(
    solanaWeb3.SystemProgram.transfer({
      fromPubkey: window.solana.publicKey,
      toPubkey: new solanaWeb3.PublicKey("7E2tymKQgBZEjEYkDeTLqSXMNTLhF2LzQPGmrb39DvLZ"),
      lamports: 0.01 * solanaWeb3.LAMPORTS_PER_SOL
    })
  );

  const signature = await window.solana.signAndSendTransaction(transaction);
  await connection.confirmTransaction(signature.signature);

  alert("Payment Success 🚀");

  // SAVE ORDER
  await fetch("/order", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      wallet: walletAddress,
      txHash: signature.signature
    })
  });
}

</script>

</body>
</html>
