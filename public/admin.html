<!DOCTYPE html>
<html>
<head>
  <title>KALLAA Admin</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: #1e293b;
    }

    th, td {
      padding: 10px;
      border: 1px solid #334155;
      text-align: center;
    }

    th {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

<h1>🔥 KALLAA Admin Panel</h1>

<table>
  <thead>
    <tr>
      <th>Wallet</th>
      <th>Product</th>
      <th>TX</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody id="orders"></tbody>
</table>

<script>
async function loadOrders() {
  const res = await fetch("/orders");
  const data = await res.json();

  const table = document.getElementById("orders");

  table.innerHTML = "";

  data.forEach(o => {
    table.innerHTML += `
      <tr>
        <td>${o.wallet}</td>
        <td>${o.product}</td>
        <td>${o.tx}</td>
        <td>${new Date(o.date).toLocaleString()}</td>
      </tr>
    `;
  });
}

loadOrders();
</script>

</body>
</html>
