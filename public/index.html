<!DOCTYPE html>
<html>
<head>
  <title>KALLAA AI Store</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🔥 KALLAA AI</h1>
  <button onclick="connectWallet()">Connect Wallet</button>
</header>

<section class="hero">
  <h2>Create Your Own AI Designed Clothes</h2>
  <input id="prompt" placeholder="Describe your design...">
  <button onclick="generate()">Generate Design</button>
</section>

<section class="products">

  <h2>👕 T-Shirts</h2>
  <div class="grid">
    <div class="card">
      <p>Basic T-Shirt</p>
      <button onclick="buyNormal('T-Shirt')">Buy ₹499</button>
      <button onclick="buySol('T-Shirt')">Buy with SOL</button>
    </div>
  </div>

  <h2>🧥 Hoodies</h2>
  <div class="grid">
    <div class="card">
      <p>Premium Hoodie</p>
      <button onclick="buyNormal('Hoodie')">Buy ₹999</button>
      <button onclick="buySol('Hoodie')">Buy with SOL</button>
    </div>
  </div>

</section>

<script src="app.js"></script>

</body>
</html>
