<!DOCTYPE html>
<html>
<head>
  <title>KALLAA AI Store</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- CUSTOM THEME -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            canvas: '#FDFBF7',
            ink: '#2B2926',
            brand: {
              blue: '#2E86C1',
              orange: '#FF7F50',
              purple: '#9B59B6',
            }
          },
          boxShadow: {
            lift: '0 10px 40px -10px rgba(0,0,0,0.3)',
          }
        }
      }
    }
  </script>

</head>

<body class="bg-[#0b1a2f] text-white">

<!-- HEADER -->
<header class="flex justify-between items-center p-5 bg-[#071224]">
  <h1 class="text-2xl font-bold">🔥 KALLAA AI</h1>
  <button onclick="connectWallet()"
    class="bg-cyan-400 px-4 py-2 rounded-lg font-bold">
    Connect Wallet
  </button>
</header>

<!-- HERO -->
<section class="text-center py-16">

  <h2 class="text-4xl font-bold mb-6">
    Create Your AI Designed Clothes 🎨
  </h2>

  <div class="flex justify-center gap-4">
    <input id="prompt"
      class="w-1/2 p-3 rounded-lg text-black"
      placeholder="Describe your design...">

    <button onclick="generate()"
      class="bg-orange-500 hover:bg-orange-600 px-6 py-3 rounded-lg font-bold shadow-lift">
      Generate
    </button>
  </div>

  <!-- IMAGE PREVIEW -->
  <div class="mt-8 flex justify-center">
    <img id="preview" class="w-72 rounded-xl shadow-lg">
  </div>

</section>

<!-- PRODUCTS -->
<section class="px-10 pb-20">

  <!-- TSHIRT -->
  <h2 class="text-2xl mb-4">👕 T-Shirts</h2>

  <div class="flex gap-6 flex-wrap">

    <div class="bg-[#1e2a3a] p-6 rounded-xl shadow-lift w-60">
      <h3 class="text-lg mb-3">Basic T-Shirt</h3>

      <button class="w-full bg-green-500 p-2 rounded mb-2"
        onclick="buyNormal('T-Shirt')">
        Buy ₹499
      </button>

      <button class="w-full bg-orange-400 p-2 rounded"
        onclick="buySol('T-Shirt')">
        Buy with SOL
      </button>
    </div>

  </div>

  <!-- HOODIE -->
  <h2 class="text-2xl mt-10 mb-4">🧥 Hoodies</h2>

  <div class="flex gap-6 flex-wrap">

    <div class="bg-[#1e2a3a] p-6 rounded-xl shadow-lift w-60">
      <h3 class="text-lg mb-3">Premium Hoodie</h3>

      <button class="w-full bg-green-500 p-2 rounded mb-2"
        onclick="buyNormal('Hoodie')">
        Buy ₹999
      </button>

      <button class="w-full bg-orange-400 p-2 rounded"
        onclick="buySol('Hoodie')">
        Buy with SOL
      </button>
    </div>

  </div>

  <!-- CUSTOM AI -->
  <h2 class="text-2xl mt-10 mb-4">🎨 Custom AI Design</h2>

  <div class="flex gap-6 flex-wrap">

    <div class="bg-[#1e2a3a] p-6 rounded-xl shadow-lift w-60">
      <h3 class="text-lg mb-3">AI Generated Cloth</h3>

      <button class="w-full bg-green-500 p-2 rounded mb-2"
        onclick="buyNormal('Custom')">
        Buy ₹1499
      </button>

      <button class="w-full bg-orange-400 p-2 rounded"
        onclick="buySol('Custom')">
        Buy with SOL
      </button>
    </div>

  </div>

</section>

<script src="app.js"></script>

</body>
</html>
