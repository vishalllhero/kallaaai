<!DOCTYPE html>
<html>
<head>
  <title>KALLAA AI Store</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1a2f;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: #071224;
      align-items: center;
    }

    header button {
      padding: 10px 15px;
      background: #00c2ff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .hero {
      padding: 40px;
      text-align: center;
    }

    .hero input {
      width: 60%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }

    .hero button {
      padding: 12px 20px;
      margin-left: 10px;
      background: orange;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .preview-box {
      margin-top: 20px;
    }

    .preview-box img {
      max-width: 300px;
      border-radius: 12px;
      box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
    }

    .products {
      padding: 30px;
    }

    .products h2 {
      margin-top: 30px;
    }

    .grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e2a3a;
      padding: 20px;
      border-radius: 12px;
      width: 200px;
      text-align: center;
    }

    .card button {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .normal {
      background: #00c853;
      color: white;
    }

    .sol {
      background: orange;
      color: black;
    }

  </style>
</head>

<body>

<header>
  <h1>🔥 KALLAA AI</h1>
  <button onclick="connectWallet()">Connect Wallet</button>
</header>

<!-- AI DESIGN SECTION -->
<section class="hero">
  <h2>Create Your Own AI Designed Clothes</h2>

  <input id="prompt" placeholder="Describe your design...">
  <button onclick="generate()">Generate Design</button>

  <!-- 🔥 IMAGE PREVIEW -->
  <div class="preview-box">
    <img id="preview">
  </div>
</section>

<!-- PRODUCTS -->
<section class="products">

  <!-- TSHIRT -->
  <h2>👕 T-Shirts</h2>
  <div class="grid">
    <div class="card">
      <p>Basic T-Shirt</p>
      <button class="normal" onclick="buyNormal('T-Shirt')">Buy ₹499</button>
      <button class="sol" onclick="buySol('T-Shirt')">Buy with SOL</button>
    </div>
  </div>

  <!-- HOODIE -->
  <h2>🧥 Hoodies</h2>
  <div class="grid">
    <div class="card">
      <p>Premium Hoodie</p>
      <button class="normal" onclick="buyNormal('Hoodie')">Buy ₹999</button>
      <button class="sol" onclick="buySol('Hoodie')">Buy with SOL</button>
    </div>
  </div>

  <!-- CUSTOM AI SECTION -->
  <h2>🎨 Custom AI Designs</h2>
  <div class="grid">
    <div class="card">
      <p>Your AI Design</p>
      <button class="normal" onclick="buyNormal('Custom AI')">Buy ₹1499</button>
      <button class="sol" onclick="buySol('Custom AI')">Buy with SOL</button>
    </div>
  </div>

</section>

<script src="app.js"></script>

</body>
</html>
