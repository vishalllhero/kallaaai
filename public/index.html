<!DOCTYPE html>
<html>
<head>
  <title>KALLAA AI</title>

  <style>
    body {
      background: #0b1a2f;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .box {
      background: #1e2a3a;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      width: 80%;
      margin: 5px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 12px 20px;
      background: orange;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🎨 KALLAA AI</h1>

<!-- PRODUCT -->
<div class="box">
  <h3>👕 Choose Product</h3>

  <select id="product">
    <option value="T-Shirt">T-Shirt</option>
    <option value="Hoodie">Hoodie</option>
    <option value="Shoes">Shoes</option>
  </select>

  <br><br>

  <button onclick="buy()">Buy with SOL</button>
</div>

<script>

/* 🔥 FINAL WORKING BUY FUNCTION */
async function buy() {

  console.log("🚀 BUTTON CLICKED");

  const product = document.getElementById("product").value;

  const wallet = "test_user";
  const tx = "tx_" + Math.random().toString(36).substring(7);

  try {
    const res = await fetch("/order", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        wallet,
        product,
        tx
      })
    });

    const data = await res.json();

    console.log("✅ RESPONSE:", data);

    if (data.success) {
      alert("✅ Order Saved!");
    } else {
      alert("❌ Failed!");
    }

  } catch (err) {
    console.log("❌ ERROR:", err);
    alert("Error aa gaya");
  }
}

</script>

</body>
</html>
