<!DOCTYPE html>
<html>
<head>
  <title>KALLAA AI</title>

  <!-- CACHE FIX -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />

  <style>
    body {
      background: #0b1a2f;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .box {
      background: #1e2a3a;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      background: orange;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🎨 KALLAA AI</h1>

<div class="box">
  <h3>👕 Choose Product</h3>

  <select id="product">
    <option value="T-Shirt">T-Shirt</option>
    <option value="Hoodie">Hoodie</option>
  </select>

  <br><br>

  <button onclick="buy()">Buy</button>
</div>

<script>

async function buy() {

  console.log("🚀 BUTTON CLICKED");

  const product = document.getElementById("product").value;

  try {
    const res = await fetch("https://kallaaai.onrender.com/order", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        wallet: "test_user",
        product: product,
        tx: "test_tx"
      })
    });

    const data = await res.json();

    console.log("✅ RESPONSE:", data);

    if (data.success) {
      alert("✅ ORDER SAVED");
    } else {
      alert("❌ FAILED");
    }

  } catch (err) {
    console.log(err);
    alert("❌ ERROR");
  }
}

</script>

</body>
</html>
